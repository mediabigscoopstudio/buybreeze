{% extends 'hrpanel/base.html' %}
{% block content %}
<div class="container-fluid py-4">
    <div class="row g-4">
        <div class="col-md-12">
            <div class="card bg-dark text-white p-4 border-0 rounded-4">
                <h5>TL Control Panel</h5>
                <p class="opacity-75">Welcome back, {{ user.username }}</p>
            </div>
        </div>
        <div class="col-md-12">
            <div class="card shadow-sm border-0 p-4 rounded-4">
                <h6>My Team Attendance</h6>
                <table class="table mt-3">
                    <thead><tr><th>Employee</th><th>Punch In</th><th>Hours</th></tr></thead>
                    <tbody><tr><td>Demo Member</td><td>09:00 AM</td><td>8h</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
