{% extends 'dash/base.html' %}
{% block page_title %}Edit User{% endblock %}
{% block content %}

<div class="page-header">
  <div>
    <h4>Edit User</h4>
    <div class="sub">{{ data.user.get_full_name }}</div>
  </div>
  <a href="{% url 'users' %}" class="btn btn-sm btn-action"><i class="bi bi-arrow-left me-1"></i> Back</a>
</div>

<div class="card" style="max-width:720px;">
  <div class="card-body">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="form-section">Account Info</div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">First Name *</label>
          <input type="text" name="first_name" class="form-control" required value="{{ data.user.first_name }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control" value="{{ data.user.last_name }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ data.user.email }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" value="{{ data.phone }}">
        </div>
      </div>

      <div class="form-section">Role & Assignment</div>
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label">Role *</label>
          <select name="role" class="form-select" required>
            <option value="manager" {% if data.role == 'manager' %}selected{% endif %}>Branch Manager</option>
            <option value="tl" {% if data.role == 'tl' %}selected{% endif %}>Team Leader</option>
            <option value="member" {% if data.role == 'member' %}selected{% endif %}>Call Team Member</option>
            <option value="hr" {% if data.role == 'hr' %}selected{% endif %}>HR Panel</option>
            <option value="marketing" {% if data.role == 'marketing' %}selected{% endif %}>Marketing Admin</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Branch</label>
          <select name="branch" class="form-select">
            <option value="">None</option>
            {% for b in branches %}
              <option value="{{ b.id }}" {% if data.branch_id == b.id %}selected{% endif %}>{{ b.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Reports To</label>
          <select name="reports_to" class="form-select">
            <option value="">None</option>
            {% for p in all_profiles %}
              <option value="{{ p.id }}" {% if data.reports_to_id == p.id %}selected{% endif %}>
                {{ p.user.get_full_name }} ({{ p.get_role_display }})
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Profile Photo</label>
          {% if data.profile_pic %}
            <div class="mb-1">
              <img src="{{ data.profile_pic.url }}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
            </div>
          {% endif %}
          <input type="file" name="profile_pic" class="form-control" accept="image/*">
        </div>
      </div>

      <div class="d-flex gap-2 mt-2">
        <button type="submit" class="btn btn-primary btn-sm px-4">Update User</button>
        <a href="{% url 'users' %}" class="btn btn-sm btn-action">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
