{% extends 'dash/base.html' %}
{% block page_title %}Add User{% endblock %}
{% block content %}

<div class="page-header">
  <div>
    <h4>Add User</h4>
    <div class="sub">Create a new user account</div>
  </div>
  <a href="{% url 'users' %}" class="btn btn-sm btn-action"><i class="bi bi-arrow-left me-1"></i> Back</a>
</div>

<div class="card" style="max-width:720px;">
  <div class="card-body">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="form-section">Account Info</div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">First Name *</label>
          <input type="text" name="first_name" class="form-control" required placeholder="First name">
        </div>
        <div class="col-md-6">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control" placeholder="Last name">
        </div>
        <div class="col-md-6">
          <label class="form-label">Username *</label>
          <input type="text" name="username" class="form-control" required placeholder="Unique username">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="email@domain.com">
        </div>
        <div class="col-md-6">
          <label class="form-label">Password *</label>
          <input type="password" name="password" class="form-control" required placeholder="Set password">
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" placeholder="+91 XXXXX XXXXX">
        </div>
      </div>

      <div class="form-section">Role & Assignment</div>
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label">Role *</label>
          <select name="role" class="form-select" required>
            <option value="">Select role</option>
            <option value="manager">Branch Manager</option>
            <option value="tl">Team Leader</option>
            <option value="employee">Call Team Member</option>
            <option value="hr">HR Panel</option>
            <option value="marketing">Marketing Admin</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Branch</label>
          <select name="branch" class="form-select">
            <option value="">Select branch</option>
            {% for b in branches %}
              <option value="{{ b.id }}">{{ b.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Reports To</label>
          <select name="reports_to" class="form-select">
            <option value="">None</option>
            {% for p in all_profiles %}
              <option value="{{ p.id }}" {% if data.reports_to_id == p.id %}selected{% endif %}>
              {{ p.user.get_full_name|default:p.user.username }} 
              ({{ p.get_role_display }} | {{ p.branch.name|default:"No Branch" }})
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Profile Photo</label>
          <input type="file" name="profile_pic" class="form-control" accept="image/*">
        </div>
      </div>

      <div class="d-flex gap-2 mt-2">
        <button type="submit" class="btn btn-primary btn-sm px-4">Create User</button>
        <a href="{% url 'users' %}" class="btn btn-sm btn-action">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
