{% extends 'dash/base.html' %}
{% block page_title %}Add Lead{% endblock %}
{% block content %}

<div class="page-header">
  <div><h4>Add Lead</h4><div class="sub">Create a new lead record</div></div>
  <a href="{% url 'leads' %}" class="btn btn-sm btn-action"><i class="bi bi-arrow-left me-1"></i> Back</a>
</div>

<div class="card" style="max-width:800px;">
  <div class="card-body">
    <form method="POST">
      {% csrf_token %}

      <div class="form-section">Contact Info</div>
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label">Full Name *</label>
          <input type="text" name="name" class="form-control" required placeholder="Lead name">
        </div>
        <div class="col-md-4">
          <label class="form-label">Phone *</label>
          <input type="text" name="phone" class="form-control" required placeholder="+91 XXXXX XXXXX">
        </div>
        <div class="col-md-4">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="Optional">
        </div>
        <div class="col-md-4">
          <label class="form-label">Location (City / Area)</label>
          <input type="text" name="location" class="form-control" placeholder="e.g. Salt Lake, Kolkata">
        </div>
      </div>

      <div class="form-section">Lead Source</div>
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label">Source *</label>
          <select name="source" class="form-select" required>
            <option value="">Select source</option>
            <option value="meta">Meta Ads (Facebook/Instagram)</option>
            <option value="google">Google Ads</option>
            <option value="website">Website Form</option>
            <option value="social">Social Media (Organic)</option>
            <option value="campaign">Campaign</option>
            <option value="referral">Referral</option>
            <option value="walkin">Walk-in</option>
            <option value="whatsapp">WhatsApp Inbound</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Campaign Name</label>
          <input type="text" name="campaign_name" class="form-control" placeholder="Campaign name / ID">
        </div>
        <div class="col-md-4">
          <label class="form-label">Ad Set</label>
          <input type="text" name="ad_set" class="form-control" placeholder="Ad set name">
        </div>
        <div class="col-md-4">
          <label class="form-label">Ad Creative</label>
          <input type="text" name="ad_creative" class="form-control" placeholder="Creative name">
        </div>
        <div class="col-md-8">
          <label class="form-label">Landing Page URL</label>
          <input type="url" name="landing_page_url" class="form-control" placeholder="https://...">
        </div>
      </div>

      <div class="form-section">Property Interest</div>
      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <label class="form-label">Property Type</label>
          <select name="property_type" class="form-select">
            <option value="">Select</option>
            <option value="apartment">Apartment</option>
            <option value="villa">Villa</option>
            <option value="plot">Plot</option>
            <option value="commercial">Commercial</option>
            <option value="studio">Studio</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">BHK Preference</label>
          <select name="bhk_preference" class="form-select">
            <option value="">Select</option>
            <option value="1bhk">1 BHK</option>
            <option value="2bhk">2 BHK</option>
            <option value="3bhk">3 BHK</option>
            <option value="4bhk+">4 BHK+</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Budget Min (₹)</label>
          <input type="number" name="budget_min" class="form-control" placeholder="e.g. 3000000">
        </div>
        <div class="col-md-3">
          <label class="form-label">Budget Max (₹)</label>
          <input type="number" name="budget_max" class="form-control" placeholder="e.g. 6000000">
        </div>
        <div class="col-md-4">
          <label class="form-label">Preferred Location</label>
          <input type="text" name="property_location" class="form-control" placeholder="Area preference">
        </div>
        <div class="col-md-4">
          <label class="form-label">Purpose</label>
          <select name="purpose" class="form-select">
            <option value="">Select</option>
            <option value="investment">Investment</option>
            <option value="selfuse">Self Use</option>
            <option value="rental">Rental</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Timeline</label>
          <select name="timeline" class="form-select">
            <option value="">Select</option>
            <option value="immediate">Immediate</option>
            <option value="3months">Within 3 Months</option>
            <option value="6months">Within 6 Months</option>
            <option value="1year">1 Year+</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Property Readiness</label>
          <select name="readiness" class="form-select">
            <option value="">Select</option>
            <option value="ready">Ready to Move</option>
            <option value="underconstruction">Under Construction</option>
          </select>
        </div>
      </div>

      <div class="form-section">Assignment & Status</div>
      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <label class="form-label">Temperature</label>
          <select name="temperature" class="form-select">
            <option value="cold">❄️ Cold</option>
            <option value="warm">🌤 Warm</option>
            <option value="hot">🔥 Hot</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Stage</label>
          <select name="stage" class="form-select">
            <option value="new">New</option>
            <option value="contacted">Contacted</option>
            <option value="interested">Interested</option>
            <option value="site_visit">Site Visit</option>
            <option value="negotiation">Negotiation</option>
            <option value="closed">Closed</option>
            <option value="lost">Lost</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Branch</label>
          <select name="branch" class="form-select">
            <option value="">Select branch</option>
            {% for b in branches %}
              <option value="{{ b.id }}">{{ b.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Assign To</label>
          <select name="assigned_to" class="form-select">
            <option value="">Unassigned</option>
            {% for m in members %}
              <option value="{{ m.id }}">{{ m.user.get_full_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="2" placeholder="Any additional notes..."></textarea>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary btn-sm px-4">Save Lead</button>
        <a href="{% url 'leads' %}" class="btn btn-sm btn-action">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
