{% extends 'dash/base.html' %}
{% block page_title %}Edit Call Log{% endblock %}
{% block content %}

<div class="page-header">
  <div><h4>Edit Call Log</h4><div class="sub">Update call details</div></div>
  <a href="{% url 'calls' %}" class="btn btn-sm btn-action"><i class="bi bi-arrow-left me-1"></i> Back</a>
</div>

<div class="card" style="max-width:680px;">
  <div class="card-body">
    <form method="POST">
      {% csrf_token %}

      <div class="form-section">Call Details</div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Lead *</label>
          <select name="lead" class="form-select" required>
            <option value="">Select lead</option>
            {% for l in all_leads %}
              <option value="{{ l.id }}" {% if data.lead_id == l.id %}selected{% endif %}>
                {{ l.name }} — {{ l.phone }}
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Call Type *</label>
          <select name="call_type" class="form-select" required>
            <option value="outbound" {% if data.call_type == 'outbound' %}selected{% endif %}>Outbound</option>
            <option value="inbound" {% if data.call_type == 'inbound' %}selected{% endif %}>Inbound</option>
            <option value="missed" {% if data.call_type == 'missed' %}selected{% endif %}>Missed</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Duration (seconds)</label>
          <input type="number" name="call_duration" class="form-control" value="{{ data.call_duration }}" min="0">
        </div>
        <div class="col-md-6">
          <label class="form-label">Outcome *</label>
          <select name="call_outcome" class="form-select" required>
            <option value="interested" {% if data.call_outcome == 'interested' %}selected{% endif %}>Interested</option>
            <option value="not_interested" {% if data.call_outcome == 'not_interested' %}selected{% endif %}>Not Interested</option>
            <option value="callback" {% if data.call_outcome == 'callback' %}selected{% endif %}>Callback Requested</option>
            <option value="not_answered" {% if data.call_outcome == 'not_answered' %}selected{% endif %}>Not Answered</option>
            <option value="converted" {% if data.call_outcome == 'converted' %}selected{% endif %}>Converted</option>
            <option value="site_visit" {% if data.call_outcome == 'site_visit' %}selected{% endif %}>Site Visit Scheduled</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Next Follow-up Date & Time</label>
          <input type="datetime-local" name="next_followup_at" class="form-control"
            value="{{ data.next_followup_at|date:'Y-m-d\TH:i' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Call Notes</label>
          <textarea name="call_notes" class="form-control" rows="3">{{ data.call_notes }}</textarea>
        </div>
      </div>

      <div class="form-section">Assignment</div>
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">Called By</label>
          <select name="called_by" class="form-select">
            <option value="">Select member</option>
            {% for m in members %}
              <option value="{{ m.id }}" {% if data.called_by_id == m.id %}selected{% endif %}>
                {{ m.user.get_full_name }}
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Branch</label>
          <select name="branch" class="form-select">
            <option value="">Select branch</option>
            {% for b in branches %}
              <option value="{{ b.id }}" {% if data.branch_id == b.id %}selected{% endif %}>{{ b.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary btn-sm px-4">Update Call Log</button>
        <a href="{% url 'calls' %}" class="btn btn-sm btn-action">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
