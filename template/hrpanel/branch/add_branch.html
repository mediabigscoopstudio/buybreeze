{% extends 'dash/base.html' %}
{% block page_title %}Add Branch{% endblock %}
{% block content %}

<div class="page-header">
  <div>
    <h4>Add Branch</h4>
    <div class="sub">Create a new branch</div>
  </div>
  <a href="{% url 'branch' %}" class="btn btn-sm btn-action">
    <i class="bi bi-arrow-left me-1"></i> Back
  </a>
</div>

<div class="card" style="max-width:680px;">
  <div class="card-body">
    <form method="POST">
      {% csrf_token %}

      <div class="form-section">Basic Info</div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Branch Name *</label>
          <input type="text" name="name" class="form-control" required placeholder="e.g. Kolkata North">
        </div>
        <div class="col-md-6">
          <label class="form-label">Location *</label>
          <input type="text" name="location" class="form-control" required placeholder="City / Area">
        </div>
        <div class="col-12">
          <label class="form-label">Address</label>
          <textarea name="address" class="form-control" rows="2" placeholder="Full address"></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" placeholder="+91 XXXXX XXXXX">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="branch@email.com">
        </div>
      </div>

      <div class="form-section">HR GPS Settings</div>
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <label class="form-label">GPS Latitude</label>
          <input type="text" name="gps_lat" class="form-control" placeholder="22.5726">
        </div>
        <div class="col-md-4">
          <label class="form-label">GPS Longitude</label>
          <input type="text" name="gps_lng" class="form-control" placeholder="88.3639">
        </div>
        <div class="col-md-4">
          <label class="form-label">Punch-in Radius (m)</label>
          <input type="number" name="gps_radius" class="form-control" value="100" min="50" max="1000">
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary btn-sm px-4">Save Branch</button>
        <a href="{% url 'branch' %}" class="btn btn-sm btn-action">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
