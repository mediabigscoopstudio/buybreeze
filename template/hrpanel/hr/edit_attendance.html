{% extends 'hrpanel/base.html' %}
{% block page_title %}Edit Attendance{% endblock %}
{% block content %}

<div class="page-header">
  <div><h4>Edit Attendance</h4><div class="sub">Update punch record</div></div>
  <a href="{% url 'attendance' %}" class="btn btn-sm btn-action"><i class="bi bi-arrow-left me-1"></i> Back</a>
</div>

<div class="card" style="max-width:620px;">
  <div class="card-body">
    <form method="POST">
      {% csrf_token %}
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Employee *</label>
          <select name="employee" class="form-select" required>
            {% for e in employees %}<option value="{{ e.id }}" {% if data.employee_id == e.id %}selected{% endif %}>{{ e.user.get_full_name }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Branch</label>
          <select name="branch" class="form-select">
            <option value="">Select branch</option>
            {% for b in branches %}<option value="{{ b.id }}" {% if data.branch_id == b.id %}selected{% endif %}>{{ b.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Date *</label>
          <input type="date" name="date" class="form-control" required value="{{ data.date|date:'Y-m-d' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Punch In</label>
          <input type="datetime-local" name="punch_in" class="form-control" value="{{ data.punch_in|date:'Y-m-d\TH:i' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Punch Out</label>
          <input type="datetime-local" name="punch_out" class="form-control" value="{{ data.punch_out|date:'Y-m-d\TH:i' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Status *</label>
          <select name="status" class="form-select" required>
            <option value="present" {% if data.status == 'present' %}selected{% endif %}>Present</option>
            <option value="absent" {% if data.status == 'absent' %}selected{% endif %}>Absent</option>
            <option value="late" {% if data.status == 'late' %}selected{% endif %}>Late</option>
            <option value="half_day" {% if data.status == 'half_day' %}selected{% endif %}>Half Day</option>
            <option value="wfh" {% if data.status == 'wfh' %}selected{% endif %}>Work From Home</option>
            <option value="on_leave" {% if data.status == 'on_leave' %}selected{% endif %}>On Leave</option>
            <option value="holiday" {% if data.status == 'holiday' %}selected{% endif %}>Holiday</option>
          </select>
        </div>
        <div class="col-md-6 d-flex align-items-end">
          <div class="form-check">
            <input type="checkbox" name="is_out_of_zone" class="form-check-input" id="outofzone" {% if data.is_out_of_zone %}checked{% endif %}>
            <label class="form-check-label" for="outofzone" style="font-size:0.84rem;">Out of Zone</label>
          </div>
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="2">{{ data.notes }}</textarea>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary btn-sm px-4">Update Record</button>
        <a href="{% url 'attendance' %}" class="btn btn-sm btn-action">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
