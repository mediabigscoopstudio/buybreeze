{% extends 'hrpanel/base.html' %}
{% block page_title %}Add Payroll{% endblock %}
{% block content %}

<div class="page-header">
  <div><h4>Add Payroll Record</h4></div>
  <a href="{% url 'payroll' %}" class="btn btn-sm btn-action"><i class="bi bi-arrow-left me-1"></i> Back</a>
</div>

<div class="card" style="max-width:580px;">
  <div class="card-body">
    <form method="POST">
      {% csrf_token %}
      <div class="row g-3 mb-3">
        <div class="col-12">
          <label class="form-label">Employee *</label>
          <select name="employee" class="form-select" required>
            <option value="">Select employee</option>
            {% for e in employees %}
              <option value="{{ e.id }}">{{ e.user.get_full_name }} ({{ e.get_role_display }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Month *</label>
          <select name="month" class="form-select" required>
            <option value="January">January</option>
            <option value="February">February</option>
            <option value="March">March</option>
            <option value="April">April</option>
            <option value="May">May</option>
            <option value="June">June</option>
            <option value="July">July</option>
            <option value="August">August</option>
            <option value="September">September</option>
            <option value="October">October</option>
            <option value="November">November</option>
            <option value="December">December</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Year *</label>
          <input type="number" name="year" class="form-control" required value="2026" min="2020" max="2050">
        </div>
        <div class="col-md-4">
          <label class="form-label">Base Salary (₹) *</label>
          <input type="number" name="base_salary" class="form-control" required placeholder="e.g. 25000" step="0.01">
        </div>
        <div class="col-md-4">
          <label class="form-label">Bonus (₹)</label>
          <input type="number" name="bonus" class="form-control" value="0" step="0.01">
        </div>
        <div class="col-md-4">
          <label class="form-label">Deductions (₹)</label>
          <input type="number" name="deductions" class="form-control" value="0" step="0.01">
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="2" placeholder="Any notes..."></textarea>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary btn-sm px-4">Save Payroll</button>
        <a href="{% url 'payroll' %}" class="btn btn-sm btn-action">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
