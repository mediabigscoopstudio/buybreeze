{% extends 'hrpanel/base.html' %}
{% block content %}
<div class="container-fluid py-4">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 p-4" style="border-radius: 12px;">
                <h6 class="text-muted">Branch Activity</h6>
                <h2 class="fw-bold">88%</h2>
                <small class="text-success">Team Leaders Active</small>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card shadow-sm border-0 p-4" style="border-radius: 12px;">
                <h5>Branch Overview</h5>
                <hr>
                <table class="table">
                    <thead><tr><th>TL Name</th><th>Team Count</th><th>Status</th></tr></thead>
                    <tbody><tr><td>{{ user.get_full_name }}</td><td>12</td><td><span class="badge bg-success">Online</span></td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
